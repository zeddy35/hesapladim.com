<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#2563EB"/>
  <!-- Calculator body -->
  <rect x="22" y="18" width="56" height="64" rx="8" fill="white"/>
  <!-- Display area -->
  <rect x="29" y="25" width="42" height="16" rx="4" fill="#EFF6FF"/>
  <!-- Display number -->
  <text x="69" y="37" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563EB" text-anchor="end">0</text>
  <!-- Button rows -->
  <!-- Row 1: 4 buttons -->
  <rect x="29" y="47" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="40" y="47" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="51" y="47" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="62" y="47" width="8" height="7" rx="2" fill="#2563EB"/>
  <!-- Row 2: 4 buttons -->
  <rect x="29" y="57" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="40" y="57" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="51" y="57" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="62" y="57" width="8" height="7" rx="2" fill="#2563EB"/>
  <!-- Row 3: 4 buttons -->
  <rect x="29" y="67" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="40" y="67" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="51" y="67" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <!-- Equals button spans 2 rows height -->
  <rect x="62" y="67" width="8" height="7" rx="2" fill="#1D4ED8"/>
  <!-- Row 4: 0 key wide + dot -->
  <rect x="29" y="77" width="19" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="51" y="77" width="8" height="7" rx="2" fill="#DBEAFE"/>
  <rect x="62" y="77" width="8" height="7" rx="2" fill="#1D4ED8"/>
</svg>
