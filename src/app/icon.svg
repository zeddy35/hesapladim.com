<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy/blue-600 rounded square — matches navbar logo bg-blue-600 + rounded-lg -->
  <rect width="32" height="32" rx="6" fill="#2563eb"/>

  <!-- Calculator body (Lucide Calculator, scaled & centered) -->
  <rect x="7" y="4" width="17" height="22" rx="2.2" fill="none" stroke="white" stroke-width="1.8"/>

  <!-- Display line -->
  <line x1="10" y1="9.5" x2="21" y2="9.5" stroke="white" stroke-width="1.7" stroke-linecap="round"/>

  <!-- Right vertical column line (plus button area) -->
  <line x1="20.5" y1="14" x2="20.5" y2="18.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Button dots: 2×3 left grid -->
  <circle cx="11"  cy="15"   r="1.15" fill="white"/>
  <circle cx="15"  cy="15"   r="1.15" fill="white"/>
  <circle cx="11"  cy="19.5" r="1.15" fill="white"/>
  <circle cx="15"  cy="19.5" r="1.15" fill="white"/>
  <circle cx="11"  cy="24"   r="1.15" fill="white"/>

  <!-- Wide equals line (bottom right) -->
  <line x1="14" y1="24" x2="21.5" y2="24" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
</svg>
